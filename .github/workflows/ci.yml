name: CI PHP Em Chamas

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v3

    - name: Configurar PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: zip # Garante que o descompactador esteja ativo para o Composer

    - name: Instalar Dependências
      run: composer install --no-progress --prefer-dist

    - name: Linting (Análise Estática com PHPStan)
      # Adicionado 'php' antes do caminho para evitar erro de permissão (126)
      run: php vendor/bin/phpstan analyse src --level=1

    - name: Testes Automatizados (PHPUnit)
      # Adicionado 'php' antes do caminho para evitar erro de permissão (126)
      run: php vendor/bin/phpunit tests